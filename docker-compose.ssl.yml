# Optional overlay: HTTPS on uvicorn with certbot certs (same paths as Node).
#
#   docker compose -f docker-compose.yml -f docker-compose.ssl.yml up -d api
#
# Requires certs on the host:
#   /etc/letsencrypt/live/requi.io/fullchain.pem
#   /etc/letsencrypt/live/requi.io/privkey.pem
#
# If Apache/Nginx already terminates SSL on :443, keep SSL_ENABLED=false on the API
# and proxy HTTP to port 8000 instead (recommended).

version: '3.8'

services:
  api:
    ports:
      - "443:443"
    environment:
      SSL_ENABLED: "true"
      SSL_CERTFILE: /etc/letsencrypt/live/requi.io/fullchain.pem
      SSL_KEYFILE: /etc/letsencrypt/live/requi.io/privkey.pem
      SSL_PORT: "443"
      APP_ENV: production
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    command: >
      python scripts/run_uvicorn.py
