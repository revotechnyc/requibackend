# Live / remote Postgres (Supabase, RDS, etc.)
#
# Supabase direct hostnames are IPv6-only; Docker bridge networks usually lack
# IPv6. API/worker/beat use host networking (same connectivity as venv on host).
#
#   docker compose -f docker-compose.live.yml up --build -d
#   docker compose -f docker-compose.live.yml down
#   # or: ./scripts/start-api-live.sh
#
version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_live_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: host
    env_file:
      - .env
    environment:
      REDIS_URL: redis://127.0.0.1:6380/0
      CELERY_BROKER_URL: redis://127.0.0.1:6380/1
      CELERY_RESULT_BACKEND: redis://127.0.0.1:6380/2
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./credentials:/app/credentials:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    command: python scripts/run_uvicorn.py

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: host
    env_file:
      - .env
    environment:
      REDIS_URL: redis://127.0.0.1:6380/0
      CELERY_BROKER_URL: redis://127.0.0.1:6380/1
      CELERY_RESULT_BACKEND: redis://127.0.0.1:6380/2
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./credentials:/app/credentials:ro
    command: celery -A app.tasks.celery_app worker --loglevel=info

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: host
    env_file:
      - .env
    environment:
      REDIS_URL: redis://127.0.0.1:6380/0
      CELERY_BROKER_URL: redis://127.0.0.1:6380/1
      CELERY_RESULT_BACKEND: redis://127.0.0.1:6380/2
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    command: celery -A app.tasks.celery_app beat --loglevel=info

  flower:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "5555:5555"
    depends_on:
      - redis
    command: celery -A app.tasks.celery_app flower --port=5555

volumes:
  redis_live_data:
