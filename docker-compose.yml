version: '3.8'

# Live Supabase / remote DATABASE_URL: use docker-compose.external-db.yml overlay
# (Docker bridge lacks IPv6; Supabase direct hostnames are IPv6-only).

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - /etc/letsencrypt:/etc/letsencrypt:ro
    command: python scripts/run_uvicorn.py

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    command: celery -A app.tasks.celery_app worker --loglevel=info

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    command: celery -A app.tasks.celery_app beat --loglevel=info

  postgres:
    image: ankane/pgvector:latest
    environment:
      - POSTGRES_USER=requi
      - POSTGRES_PASSWORD=requi_password
      - POSTGRES_DB=requi_health
    # No host port publish — avoids conflict with local Postgres on 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U requi -d requi_health"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    # No host port publish — avoids conflict with local Redis on 6379
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  flower:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "5555:5555"
    depends_on:
      - redis
    command: celery -A app.tasks.celery_app flower --port=5555

volumes:
  postgres_data:
  redis_data:
